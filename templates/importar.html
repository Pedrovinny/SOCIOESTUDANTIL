{% extends 'base.html' %}

{% block title %}Importar CSV{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Importação de Alunos</h4>
            </div>
            <div class="card-body">

                <p class="text-muted small mb-3">
                    O arquivo CSV deve ter as colunas <code>matricula</code>, <code>nome</code> e <code>turma</code>.
                </p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Selecione o arquivo CSV</label>
                        <input class="form-control" type="file" name="arquivo" accept=".csv" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-upload me-1"></i>Importar CSV
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                            ← Voltar
                        </a>
                    </div>
                </form>

                {% if erro %}
                <div class="alert alert-danger mt-4">{{ erro }}</div>
                {% endif %}

                {% if mensagem %}
                <div class="alert alert-success mt-4 text-center">{{ mensagem }}</div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

{% endblock %}
