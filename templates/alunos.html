{% extends 'base.html' %}
{% block title %}Alunos{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-people me-2"></i>Alunos cadastrados</h4>
    <a href="{% url 'importar_csv' %}" class="btn btn-sm btn-outline-success">
        <i class="bi bi-upload me-1"></i>Importar CSV
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover table-striped mb-0">
            <thead class="table-success">
                <tr>
                    <th>Nome</th>
                    <th>Matrícula</th>
                    <th>Turma</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for aluno in alunos %}
                <tr>
                    <td>{{ aluno.1 }}</td>
                    <td><code>{{ aluno.2 }}</code></td>
                    <td>{{ aluno.3 }}</td>
                    <td class="text-center">
                        <a href="{% url 'perfil' aluno.0 %}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-person-lines-fill me-1"></i>Perfil
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center text-muted py-4">
                        Nenhum aluno cadastrado ainda.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
